<head>

    table {
      border-collapse: collapse;
      width: 50%;
    }
    th, td {
      border: 1px solid #000;
      padding: 8px;
      text-align: left;
      color: black;
      font-family: Arial, sans-serif;
    }
    th {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>연락처</h2>
  <table>

      <th><b>이름</b></th>
      <th><b>전화번호</b></th>
    </tr>
    <tr>
      <td>James</td>
      <td>010-1234-5678</td>
    </tr>
    <tr>
      <td>Jane</td>
      <td>010-2222-3333</td>
    </tr>
    <tr>
      <td>John</td>
      <td>010-9999-8888</td>
    </tr>
  </table>
</body>
</html>
